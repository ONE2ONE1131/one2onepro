<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 130" width="560" height="130" role="img" aria-label="One2One Pro">
  <title>One2One Pro</title>

  <!-- ─── Mark (squircle verde con "2" italic blanco) ─── -->
  <!-- Mismo mark que la versión light: el verde funciona sobre ambos fondos. -->
  <g>
    <rect x="10" y="15" width="100" height="100" rx="22" ry="22" fill="#00a86b"/>
    <text x="60" y="88" text-anchor="middle"
          font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
          font-size="68" font-weight="700" font-style="italic"
          fill="#ffffff">2</text>
  </g>

  <!-- ─── Wordmark sobre fondo oscuro ─── -->
  <text x="135" y="78"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="50" font-weight="700"
        fill="#ffffff" letter-spacing="-1.2">One<tspan fill="#00a86b">2</tspan>One</text>
  <text x="430" y="78"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="50" font-weight="400" font-style="italic"
        fill="#ffffff" opacity="0.55">Pro</text>
</svg>
