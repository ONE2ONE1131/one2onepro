<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 110" width="520" height="110" role="img" aria-label="One2One Pro">
  <title>One2One Pro</title>

  <!-- ─── Mark: dos barras + curva verde (versión para fondo oscuro) ─── -->
  <g transform="translate(8 27)">
    <rect x="0"  y="0" width="9" height="56" rx="4.5" fill="#ffffff"/>
    <path d="M13 0 C13 0 22 0 22 28 C22 56 31 56 31 56" fill="none" stroke="#00a86b" stroke-width="5" stroke-linecap="round"/>
    <rect x="40" y="0" width="9" height="56" rx="4.5" fill="#ffffff"/>
  </g>

  <!-- ─── Wordmark sobre fondo oscuro ─── -->
  <text x="80" y="72"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="48" font-weight="700"
        fill="#ffffff" letter-spacing="-1">One<tspan fill="#00a86b">2</tspan>One</text>
  <text x="365" y="72"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="48" font-weight="400" font-style="italic"
        fill="#ffffff" opacity="0.55">Pro</text>
</svg>
