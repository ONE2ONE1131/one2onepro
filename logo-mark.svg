<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="One2One Pro">
  <title>One2One Pro</title>
  <!-- Squircle verde — funciona sobre fondo claro y oscuro -->
  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="#00a86b"/>
  <!-- "2" italic Playfair en blanco — el "2" es el elemento distintivo de la marca (One2One) -->
  <text x="50" y="73" text-anchor="middle"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="68" font-weight="700" font-style="italic"
        fill="#ffffff">2</text>
</svg>
